version: '3.8'

services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Override the LLM Service URL to use the internal Docker network
      - LLM_SERVICE_URL=http://llm-service:8000
      - FRONTEND_URL=http://localhost:3001
    depends_on:
      - llm-service

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        # Pass the API URL at build time for Next.js to bake in
        - NEXT_PUBLIC_API_URL=http://localhost:3000
    ports:
      - "3001:3001"
    environment:
      # This ensures Next.js runs on 3001 inside the container
      - PORT=3001
    depends_on:
      - api

  llm-service:
    build:
      context: ./apps/llm-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env

services:
  - type: web
    name: mockbase-api
    env: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: apps/api
    envVars:
      - key: DATABASE_URL
        sync: false # Paste your Neon.tech URL here via Render Dashboard
      - key: REDIS_URL
        sync: false # Paste your Upstash URL here via Render Dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: LLM_SERVICE_URL
        value: https://mockbase-llm.onrender.com
      - key: FRONTEND_URL
        value: https://mockbase-frontend.onrender.com

  - type: web
    name: mockbase-frontend
    env: docker
    dockerfilePath: apps/frontend/Dockerfile
    dockerContext: apps/frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://mockbase-api.onrender.com

  - type: web
    name: mockbase-llm
    env: docker
    dockerfilePath: apps/llm-service/Dockerfile
    dockerContext: apps/llm-service
    envVars:
      - key: GROQ_API_KEY
        sync: false # Paste your Groq API Key here via Render Dashboard

databases:
  - name: mockbase-db
    databaseName: mockbase
    user: mockbase

services:
  - type: web
    name: mockbase-api
    env: node
    rootDir: apps/api
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mockbase-db
          property: connectionString
      - key: REDIS_URL
        sync: false # You will need to provide this manually (e.g., from Upstash)
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: LLM_SERVICE_URL
        value: https://mockbase-llm.onrender.com
      - key: FRONTEND_URL
        value: https://mockbase-frontend.onrender.com

  - type: web
    name: mockbase-frontend
    env: node
    rootDir: apps/frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://mockbase-api.onrender.com

  - type: web
    name: mockbase-llm
    env: python
    rootDir: apps/llm-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false # You will need to provide this manually in the Render dashboard
